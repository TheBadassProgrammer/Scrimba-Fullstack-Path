<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">

        <div class="header">
            <img src="images/header.png">
        </div>

        <h1>Find your film</h1>
        <a id="watchlist" href="watchlist.html">My Watchlist</a>

        <div class="search-box">
            <img id="search-icon" src="images/search-icon.png">
            <input id="search-txt" type="text" placeholder="Blade Runner">
            <button id="search-btn">Search</button>
        </div>

        <div class="films-container">
            <div class="movie">
                <img id="movie-img" src="images/header.png" alt="">
                <div class="movie-info">
                    <div class="title-stars">
                        <h2>Blade Runner</h2>
                        <img id="star-icon" src="images/star-icon.png">
                        <h3 class="rating">8.1</h3>
                    </div>
                    <div class="runtime-genre-watchlist">
                        <h3>116 min</h3>
                        <h3>Horror, Action</h3>
                        <a id="add-watchlist-btn" href="watchlist.html"><img src="images/plus-icon.png"> Watchlist</a>
                    </div>
                    <p class="plot">A blade runner must pursue and terminate four replicants who stole a ship in space, and have returned to Earth to find their creator.</p>
                </div>
            </div>
            


            <!-- <img src="images/film-icon.png">
            <h2>Start exploring</h2> -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
